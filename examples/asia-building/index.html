<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Interior Mapping — Asia Building</title>
  <style>
    :root {
      --fg: #e8ecf3;
      --fg-muted: #97a0b3;
      --bg-glass: rgba(14, 18, 26, 0.55);
      --bg-glass-strong: rgba(14, 18, 26, 0.78);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #6aa4ff;
    }
    html, body {
      margin: 0; height: 100%; background: #05070b; overflow: hidden;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
    }
    canvas { display: block; }

    /* Top-left title plate */
    #title {
      position: fixed; left: 18px; top: 18px;
      padding: 12px 16px;
      background: var(--bg-glass);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 12px; line-height: 1.5;
      pointer-events: none; user-select: none;
      max-width: 280px;
    }
    #title .eyebrow {
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--fg-muted); margin-bottom: 4px;
    }
    #title .h1 {
      font-size: 15px; font-weight: 600; letter-spacing: -0.01em; color: var(--fg);
    }
    #title .sub {
      margin-top: 6px; color: var(--fg-muted); font-size: 11px;
    }

    /* GitHub badge — black pill inside the title plate. pointer-events:auto
       overrides the plate's none so the link is actually clickable. */
    #gh-badge {
      display: inline-flex; align-items: center; gap: 7px;
      margin-top: 10px;
      padding: 6px 11px;
      background: #0a0b0d;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      color: #f4f4f5;
      font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
      text-decoration: none;
      pointer-events: auto;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
      align-self: flex-start;
    }
    #gh-badge:hover {
      background: #16181c;
      border-color: rgba(255, 255, 255, 0.22);
    }
    #gh-badge:active { transform: scale(0.97); }
    #gh-badge svg { display: block; opacity: 0.95; }

    /* FPS counter, bottom-left. Same glass language as the title plate. */
    #fps {
      position: fixed; left: 18px; bottom: 18px;
      display: inline-flex; align-items: baseline; gap: 6px;
      padding: 7px 12px;
      background: var(--bg-glass);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-variant-numeric: tabular-nums;
      pointer-events: none; user-select: none;
    }
    #fps .num {
      font-size: 14px; font-weight: 600; color: var(--fg);
      min-width: 28px; text-align: right;
    }
    #fps .label {
      font-size: 9px; font-weight: 500; color: var(--fg-muted);
      letter-spacing: 0.14em; text-transform: uppercase;
    }

    /* Bottom-center cinematic affordance */
    #cinematic-overlay {
      position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
      display: flex; align-items: center; gap: 12px;
      pointer-events: none;
      transition: opacity 360ms ease;
    }
    #cinematic-overlay.hidden { opacity: 0; }

    #hint {
      padding: 8px 14px;
      background: var(--bg-glass);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--fg-muted);
    }
    #hint .dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); margin-right: 8px; vertical-align: middle;
      box-shadow: 0 0 12px var(--accent);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.55; transform: scale(0.8); }
    }

    #replay {
      pointer-events: auto;
      display: none;
      padding: 9px 16px;
      background: var(--bg-glass-strong);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--fg);
      font: inherit; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer;
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
    }
    #replay:hover { background: rgba(28, 36, 50, 0.85); border-color: rgba(255,255,255,0.16); }
    #replay:active { transform: scale(0.97); }
    #replay svg { vertical-align: -3px; margin-right: 6px; }

    /* Tweakpane container — anchor + tasteful chrome */
    #pane {
      position: fixed; right: 18px; top: 18px;
      width: 260px;
    }
    /* Tweakpane theme overrides — premium dark */
    .tp-dfwv {
      --tp-base-background-color: rgba(14, 18, 26, 0.78);
      --tp-base-shadow-color: rgba(0, 0, 0, 0.25);
      --tp-button-background-color: rgba(255, 255, 255, 0.06);
      --tp-button-background-color-active: rgba(106, 164, 255, 0.35);
      --tp-button-background-color-focus: rgba(106, 164, 255, 0.25);
      --tp-button-background-color-hover: rgba(255, 255, 255, 0.10);
      --tp-button-foreground-color: #e8ecf3;
      --tp-container-background-color: rgba(255, 255, 255, 0.04);
      --tp-container-background-color-active: rgba(106, 164, 255, 0.25);
      --tp-container-background-color-focus: rgba(106, 164, 255, 0.18);
      --tp-container-background-color-hover: rgba(255, 255, 255, 0.07);
      --tp-container-foreground-color: #e8ecf3;
      --tp-groove-foreground-color: rgba(255, 255, 255, 0.08);
      --tp-input-background-color: rgba(255, 255, 255, 0.05);
      --tp-input-background-color-active: rgba(106, 164, 255, 0.18);
      --tp-input-background-color-focus: rgba(106, 164, 255, 0.14);
      --tp-input-background-color-hover: rgba(255, 255, 255, 0.08);
      --tp-input-foreground-color: #e8ecf3;
      --tp-label-foreground-color: #97a0b3;
      --tp-monitor-background-color: rgba(0, 0, 0, 0.2);
      --tp-monitor-foreground-color: #97a0b3;
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="title">
    <div class="eyebrow">three-fenestra</div>
    <div class="h1">Asia Tower · 160 windows</div>
    <div class="sub">Faux window interiors with interior mapping.</div>
    <a id="gh-badge" href="https://github.com/codedgar/three-fenestra" target="_blank" rel="noopener" aria-label="View source on GitHub">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      <span>View on GitHub</span>
    </a>
  </div>

  <div id="cinematic-overlay">
    <div id="hint"><span class="dot"></span>Cinematic playing · click to orbit</div>
    <button id="replay" type="button">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
      Replay cinematic
    </button>
  </div>

  <div id="pane"></div>

  <div id="fps"><span class="num">—</span><span class="label">FPS</span></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
